<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<Style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }
        
        .background-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 8s infinite ease-in-out;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 400px;
            max-width: 90%;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        #img{
            width: 170px;
            height: 170px;
            border-radius: 50%;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
        }
        
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: none;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #6a11cb;
            background: white;
        }
        
        .input-group svg {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #999;
            transition: all 0.3s;
        }
        
        .input-group input:focus + svg {
            fill: #6a11cb;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
        }
        
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(106, 17, 203, 0.6);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        
        .forgot-password a {
            color: #6a11cb;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-message {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: top 0.5s ease-in-out;
        }
</Style>
<body>
    <div class="background-shapes"></div>
    
    <div class="login-container">
        <div class="logo">
            <img src="tree.png" alt="" id="img">
        </div>
        
        <h1>Welcome Back</h1>
        <div class="input-group">
            <input type="text" id="name" placeholder="Name" required>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
         
        <div class="input-group">
            <input type="password" id="password" placeholder="Confirm Password" required>

        </div>

        <button class="login-btn" id="loginBtn">Sign up</button>
        

    </div>
    
    <div class="success-message" id="successMessage">Sign up successful!</div>
    
</body>
    <script>
        // Create floating background shapes
        function createShapes() {
            const shapes = document.querySelector('.background-shapes');
            const count = 6;
            
            for (let i = 0; i < count; i++) {
                const size = Math.random() * 300 + 50;
                const shape = document.createElement('div');
                shape.classList.add('shape');
                shape.style.width = `${size}px`;
                shape.style.height = `${size}px`;
                shape.style.left = `${Math.random() * 100}%`;
                shape.style.top = `${Math.random() * 100}%`;
                shape.style.animationDelay = `${Math.random() * 5}s`;
                shape.style.animationDuration = `${Math.random() * 10 + 5}s`;
                shapes.appendChild(shape);
            }
        }
        
        // Input field focus effect
        function setupInputEffects() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('focused');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('focused');
                });
            });
        }
        
        // Login button animation and validation
        function setupLoginButton() {
            const loginBtn = document.getElementById('loginBtn');
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const successMessage = document.getElementById('successMessage');
            
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                
                if (!email.value || !password.value) {
                    if (!email.value) {
                        shakeElement(email);
                    }
                    if (!password.value) {
                        shakeElement(password);
                    }
                    return;
                }
                
                loginBtn.textContent = 'Logging in...';
                loginBtn.disabled = true;
                
                // Simulate login process
                setTimeout(() => {
                    successMessage.style.top = '20px';
                    
                    setTimeout(() => {
                        successMessage.style.top = '-100px';
                        loginBtn.textContent = 'Login';
                        loginBtn.disabled = false;
                    }, 2000);
                }, 1500);
            });
        }
        
        // Shake animation for invalid inputs
        function shakeElement(element) {
            element.style.animation = 'none';
            setTimeout(() => {
                element.style.animation = 'shake 0.5s';
            }, 10);
        }
        
        // Add shake animation to stylesheet
        function addShakeAnimation() {
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                    20%, 40%, 60%, 80% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(style);
        }
        
        // Initialize all functions
        window.addEventListener('DOMContentLoaded', () => {
            createShapes();
            setupInputEffects();
            setupLoginButton();
            addShakeAnimation();
        });
    </script>
</html>
